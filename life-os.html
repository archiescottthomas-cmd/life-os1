// Stable input — uses uncontrolled ref, saves on change, no re-render on parent
function SI({sk,placeholder,type="text",style={},multi=false}){
  const ref=useRef(null);
  useEffect(()=>{if(ref.current){const v=load(sk,"");ref.current.value=v||"";}},[sk]);
  const onChange=e=>store(sk,e.target.value);
  if(multi)return<textarea ref={ref} placeholder={placeholder} onChange={onChange} style={{...style,resize:"vertical"}}/>;
  return<input ref={ref} type={type} placeholder={placeholder} onChange={onChange} style={style}/>;
}

function App(){

  const[schedDay,setSchedDay]=useState(getDay()in SCHEDULE?getDay():"MON");
  const[trainDay,setTrainDay]=useState(GYM_DAYS.includes(getDay())?getDay():"MON");
  const[trainWk,setTrainWk]=useState(load("train_wk",1));
  const[saved,setSaved]=useState(false);
  const[habits,setHabits]=useState(load(`h_${today()}`,{}));
  const[pLog,setPLog]=useState(load(`p_${today()}`,[])  );

  useEffect(()=>{store(`h_${today()}`,habits);},[habits]);
  useEffect(()=>{store(`p_${today()}`,pLog);},[pLog]);
  useEffect(()=>{store("train_wk",trainWk);},[trainWk]);

    if(!amount||isNaN(amount))return;
    setPLog(p=>[...p,{name,amount:parseInt(amount),time:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}]);

  function removeP(i){setPLog(p=>p.filter((_,idx)=>idx!==i));}

    const sc=SCHEDULE[schedDay];
    const now=new Date();const nm=now.getHours()*60+now.getMinutes();
    const tm=t=>{if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+m;};

                    </span>

                </div>
              );

          </div>
          <div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={S.lbl}>Protein today</span>
              <span style={{fontSize:18,fontWeight:700,color:pTotal>=pTarget?"#059669":"#E0DDD6"}}>{pTotal}<span style={{fontSize:11,color:"#444"}}>/{pTarget}g</span></span>
            </div>
            <div style={{height:4,background:"#1A1A1A",borderRadius:4,marginBottom:12}}>
              <div style={{height:4,background:pTotal>=pTarget?"#059669":"#2563EB",borderRadius:4,width:`${Math.min(100,(pTotal/pTarget)*100)}%`,transition:"width 0.3s"}}/>
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
              {PSRC.map(s=>(
                <button key={s.name} onClick={()=>addP(s.name,s.p)} style={{background:"#141414",border:"1px solid #1E1E1E",borderRadius:6,color:"#777",cursor:"pointer",fontSize:10,padding:"5px 8px"}}>
                  {s.name.split("(")[0].trim()} <span style={{color:"#2563EB",fontWeight:600}}>+{s.p}g</span>
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              <input placeholder="Custom food" value={cn} onChange={e=>setCn(e.target.value)} style={{...S.inp,flex:2}}/>
              <input placeholder="g" type="number" value={cg} onChange={e=>setCg(e.target.value)} style={{...S.inp,flex:1}}/>
              <button onClick={()=>addP(cn||"Custom",cg,()=>{setCn("");setCg("");})} style={S.btn("#2563EB")}>+</button>
            </div>
            {pLog.length>0&&pLog.map((e,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #111"}}>
                <span style={{fontSize:12,color:"#555"}}>{e.name}</span>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:12,color:"#059669",fontWeight:600}}>+{e.amount}g</span>
                  <span style={{fontSize:10,color:"#333"}}>{e.time}</span>
                  <button onClick={()=>removeP(i)} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:16,padding:"0 2px"}}>×</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // TRAINING
  function TrainingTab(){
    const prog=PROGRAM[trainDay];
    return(
      <div>
        <div style={S.hdr}>
          <span style={S.lbl}>Progressive Overload</span>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <h1 style={{fontSize:20,fontWeight:700,margin:0}}>Training</h1>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:11,color:"#444"}}>Week</span>
              <button onClick={()=>setTrainWk(w=>Math.max(1,w-1))} style={{background:"#1A1A1A",border:"1px solid #222",borderRadius:6,color:"#AAA",cursor:"pointer",width:26,height:26,fontSize:14}}>−</button>
              <span style={{fontSize:14,fontWeight:700,minWidth:20,textAlign:"center"}}>{trainWk}</span>
              <button onClick={()=>setTrainWk(w=>w+1)} style={{background:"#1A1A1A",border:"1px solid #222",borderRadius:6,color:"#AAA",cursor:"pointer",width:26,height:26,fontSize:14}}>+</button>
            </div>
          </div>
          <div style={{display:"flex",gap:5,marginTop:12,overflowX:"auto",paddingBottom:4}}>
            {GYM_DAYS.map(d=><button key={d} onClick={()=>setTrainDay(d)} style={S.pill(DC[d],trainDay===d)}>{d}</button>)}
          </div>
        </div>
        <div style={S.sec}>
          <div style={{marginBottom:10}}>
            <span style={{fontSize:14,fontWeight:700,color:tc}}>{SCHEDULE[trainDay]?.label}</span>
            <span style={{fontSize:11,color:"#555",marginLeft:8}}>{prog?.tag} · {prog?.duration}</span>
          </div>
          {prog?.exercises.map(ex=>{
            const mob=ex.category==="Mobility";
            const carry=ex.repRange==="40m";
            return(
              <div key={ex.id} style={{...S.card,padding:"12px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:9,fontWeight:700,background:CC[ex.category]+"22",color:CC[ex.category],padding:"2px 7px",borderRadius:4}}>{ex.category}</span>
                    <span style={{fontSize:13,fontWeight:600,color:"#DDD"}}>{ex.name}</span>
                  </div>
                  <span style={{fontSize:11,color:"#444"}}>{ex.repRange}</span>
                </div>
                {mob?(
                  <SI sk={tKey(trainWk,trainDay,ex.id,0,"note")} placeholder="Notes" style={S.inp}/>
                ):(
                  <>
                    <div style={{display:"grid",gridTemplateColumns:"22px 1fr 1fr 1fr",gap:5,marginBottom:5}}>
                      <span/><span style={{fontSize:9,color:"#333",textAlign:"center",textTransform:"uppercase"}}>kg</span>
                      <span style={{fontSize:9,color:"#333",textAlign:"center",textTransform:"uppercase"}}>{carry?"m":"reps"}</span>
                      <span style={{fontSize:9,color:"#333",textAlign:"center",textTransform:"uppercase"}}>prev</span>
                    </div>
                    {Array.from({length:ex.sets}).map((_,i)=>{
                      const pk=getPrev(ex.id,i,"kg");const pr=getPrev(ex.id,i,"reps");
                      const ps=pk||pr?`${pk||"—"}×${pr||"—"}`:"—";
                      return(
                        <div key={i} style={{display:"grid",gridTemplateColumns:"22px 1fr 1fr 1fr",gap:5,marginBottom:4,alignItems:"center"}}>
                          <span style={{fontSize:10,color:"#333",fontWeight:600}}>S{i+1}</span>
                          <SI sk={tKey(trainWk,trainDay,ex.id,i,"kg")} placeholder="kg" type="number" style={S.num}/>
                          <SI sk={tKey(trainWk,trainDay,ex.id,i,"reps")} placeholder={carry?"m":"reps"} type="number" style={S.num}/>
                          <span style={{fontSize:10,color:"#2A2A2A",textAlign:"center"}}>{ps}</span>
                        </div>
                      );
                    })}
                    <SI sk={tKey(trainWk,trainDay,ex.id,99,"note")} placeholder="Note (optional)" style={{...S.inp,marginTop:6,fontSize:11}}/>
                  </>
                )}
              </div>
            );
          })}
          <button onClick={saveTrain} style={{...S.btn(tc),width:"100%",padding:14,fontSize:14}}>
            {saved?"✓ Saved":"Save Session"}
          </button>
        </div>
      </div>
    );
  }

  // INA
  function InaTab(){
    const dk=`ina_${today()}`;
    const[dmsVal,setDmsVal]=useState(load(`${dk}_dms`,""));
    const dmTarget=50;
    const dmsNum=parseInt(dmsVal)||0;
    const pct=Math.min(100,Math.round((dmsNum/dmTarget)*100));
    return(
      <div>
        <div style={S.hdr}>
          <span style={S.lbl}>INA Creatives</span>
          <h1 style={{fontSize:20,fontWeight:700,margin:0}}>Outreach</h1>
          <div style={{marginTop:6,fontSize:11,color:"#444"}}>{new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"short"})}</div>
        </div>
        <div style={S.sec}>
          <div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={S.lbl}>New DMs today</span>
              <span style={{fontSize:20,fontWeight:700,color:pct>=100?"#059669":"#E0DDD6"}}>{dmsNum}<span style={{fontSize:12,color:"#444"}}>/{dmTarget}</span></span>
            </div>
            <div style={{height:4,background:"#1A1A1A",borderRadius:4,marginBottom:12}}>
              <div style={{height:4,background:pct>=100?"#059669":"#7C3AED",borderRadius:4,width:`${pct}%`,transition:"width 0.3s"}}/>
            </div>
            <input type="number" placeholder="DMs sent today" defaultValue={load(`${dk}_dms`,"")}
              onChange={e=>{store(`${dk}_dms`,e.target.value);setDmsVal(e.target.value);}} style={S.inp}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            {[{k:`${dk}_followups`,l:"Follow-ups sent"},{k:`${dk}_calls`,l:"Calls booked"},{k:`${dk}_emails_sent`,l:"Emails sent"},{k:`${dk}_email_replies`,l:"Email replies"}].map(m=>(
              <div key={m.k} style={S.card}>
                <span style={S.lbl}>{m.l}</span>
                <SI sk={m.k} placeholder="0" type="number" style={{...S.num,fontSize:22,fontWeight:700,padding:"8px"}}/>
              </div>
            ))}
          </div>
          <div style={S.card}>
            <span style={S.lbl}>Session note / priorities</span>
            <SI sk={`${dk}_note`} placeholder="Focus tonight? Pipeline updates?" style={{...S.inp,minHeight:80}} multi/>
          </div>
          <div style={{...S.card,background:"#0A0A0A"}}>
            <span style={S.lbl}>Weekly targets</span>
            {[{l:"DMs/week",v:"300 (50/day)",c:"#7C3AED"},{l:"Calls booked/week",v:"3–5 minimum",c:"#059669"},{l:"Email sends/week",v:"200 (40/day)",c:"#2563EB"},{l:"Bridge → Call",v:"Primary conversion focus",c:"#D97706"}].map((t,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<3?"1px solid #111":"none"}}>
                <span style={{fontSize:12,color:"#555"}}>{t.l}</span>
                <span style={{fontSize:12,color:t.c,fontWeight:600}}>{t.v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // FINANCE
  function FinanceTab(){
    return(
      <div>
        <div style={S.hdr}><span style={S.lbl}>Coming soon</span><h1 style={{fontSize:20,fontWeight:700,margin:0}}>Finance</h1></div>
        <div style={{...S.sec,textAlign:"center",paddingTop:60}}>
          <div style={{fontSize:40,marginBottom:16}}>💷</div>
          <p style={{color:"#444",fontSize:14,lineHeight:1.8}}>Finance tracker coming soon.<br/>Weekly budget, Aldi shop,<br/>savings + INA revenue.</p>
        </div>
      </div>
    );
  }

  const TABS=[
    {id:"today",icon:"◈",label:"Today",color:dc},
    {id:"habits",icon:"✓",label:"Habits",color:"#059669"},
    {id:"training",icon:"⬡",label:"Train",color:tc},
    {id:"ina",icon:"◎",label:"INA",color:"#7C3AED"},
    {id:"finance",icon:"◇",label:"Finance",color:"#D97706"},
  ];

  return(
    <div style={S.wrap}>
      {tab==="today"&&<TodayTab/>}
      {tab==="habits"&&<HabitsTab/>}
      {tab==="training"&&<TrainingTab/>}
      {tab==="ina"&&<InaTab/>}
      {tab==="finance"&&<FinanceTab/>}
      <div style={S.bar}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={S.tbtn(tab===t.id,t.color)}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:600,letterSpacing:"0.04em"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js')
      .then(function(reg) { console.log('SW registered, scope:', reg.scope); })
      .catch(function(err) { console.warn('SW registration failed:', err); });
  });
}
</script>
</body>
</html>
