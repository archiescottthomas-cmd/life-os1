function store(k, v) {
  try {
    if (v === undefined) return JSON.parse(localStorage.getItem(k));
    localStorage.setItem(k, JSON.stringify(v));
  } catch (e) {}
}
function todayStr() { return new Date().toDateString(); }
function mondayOf(d) {
  var dt = new Date(d);
  var day = dt.getDay();
  var diff = (day === 0 ? -6 : 1) - day;
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0, 0, 0, 0);
  return dt;
}
function weekKey(d) { return mondayOf(d || new Date()).toDateString(); }
function lastNDates(n) {
  var arr = [];
  for (var i = 0; i < n; i++) {
    var d = new Date();
    d.setDate(d.getDate() - i);
    arr.push(d);
  }
  return arr;
}
function isWeekendDate(d) { var day = d.getDay(); return day === 0 || day === 6; }

function loadSchedule() {

  var merged = {};
  ALL_DAYS.forEach(function (d) {
    merged[d] = Object.assign({}, SCHEDULE_DEFAULT[d], override[d] || {});
  });
  return merged;
}
function loadWorkoutPlan() {
  var cfg = store("workout_plan_cfg");
  var merged = {};
  ALL_DAYS.forEach(function (d) { merged[d] = (cfg && cfg[d]) || WORKOUT_PLAN_DEFAULT[d] || []; });
  return merged;
}
function getAllExerciseNames() {
  var names = {};
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k.indexOf("workout_log_") === 0) {
      var rec = store(k);
      if (rec && rec.sets) Object.keys(rec.sets).forEach(function (n) { if (rec.sets[n] && rec.sets[n].length) names[n] = true; });
    }
  }
  return Object.keys(names).sort();
}
function getExerciseHistory(name) {
  var rows = [];
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    if (k.indexOf("workout_log_") === 0) {
      var rec = store(k);
      if (rec && rec.sets && rec.sets[name] && rec.sets[name].length) {
        var sets = rec.sets[name].filter(function (s) { return s.weight !== "" && s.reps !== ""; });
        if (sets.length) {
          var maxW = Math.max.apply(null, sets.map(function (s) { return parseFloat(s.weight) || 0; }));
          rows.push({ date: k.slice("workout_log_".length), sets: sets, maxWeight: maxW });
        }
      }
    }
  }
  rows.sort(function (a, b) { return new Date(b.date) - new Date(a.date); });
  return rows;
}

// ---------- sync (Firebase, optional) ----------
var SYNC_PREFIXES = ["habits_", "plog_", "trainwk_", "ina_dm_", "ina_em_", "ina_tasks_", "workout_log_"];
var SYNC_SINGLETONS = ["finance_tx", "schedule_cfg", "habits_cfg", "workout_plan_cfg", "finance_goals"];

function collectState() {
  var out = {};
  for (var i = 0; i < localStorage.length; i++) {
    var k = localStorage.key(i);
    var isPrefixed = SYNC_PREFIXES.some(function (p) { return k.indexOf(p) === 0; });
    if (isPrefixed || SYNC_SINGLETONS.indexOf(k) !== -1) out[k] = localStorage.getItem(k);
  }
  return out;
}
function applyState(obj) {
  Object.keys(obj).forEach(function (k) { localStorage.setItem(k, obj[k]); });
}

async function initSync() {
  var cfg = window.__LIFE_OS_SYNC__;
  if (!cfg || !cfg.firebaseConfig || !cfg.firebaseConfig.apiKey) return null;
  try {
    var appMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    var authMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
    var fsMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
    var app = appMod.initializeApp(cfg.firebaseConfig);
    var auth = authMod.getAuth(app);
    await authMod.signInAnonymously(auth);
    var db = fsMod.getFirestore(app);
    var ref = fsMod.doc(db, "synced", cfg.syncId || "default");
    return { fsMod: fsMod, ref: ref };
  } catch (e) {
    console.warn("Firebase sync unavailable, continuing local-only:", e);
    return null;
  }
}
function withTimeout(promise, ms) {
  return Promise.race([promise, new Promise(function (resolve) { setTimeout(function () { resolve(null); }, ms); })]);
}
var __pushTimer = null;
function schedulePush() {
  if (!window.__lifeOsSync) return;
  if (__pushTimer) clearTimeout(__pushTimer);
  __pushTimer = setTimeout(function () {
    var sync = window.__lifeOsSync;
    var updatedAt = Date.now();
    localStorage.setItem("__updatedAt__", String(updatedAt));
    sync.fsMod.setDoc(sync.ref, { blob: JSON.stringify(collectState()), updatedAt: updatedAt })
      .catch(function (e) { console.warn("sync push failed", e); });
  }, 2000);
}

// ---------- trends ----------
function computeTrends(days) {
  var dates = lastNDates(days);
  var habitPctSum = 0, habitDaysCount = 0;
  var proteinSum = 0, kcalSum = 0, nutritionDaysCount = 0;
  var dmSent = 0, dmReplies = 0, emSent = 0, emReplies = 0;
  dates.forEach(function (d) {
    var ds = d.toDateString();
    var h = store("habits_" + ds);
    if (h) {
      var total = habitTotalFor(d);
      var done = Object.keys(h).filter(function (k) { return h[k]; }).length;
      habitPctSum += done / total;
      habitDaysCount++;
    }
    var p = store("plog_" + ds);
    if (p) {
      proteinSum += p.reduce(function (s, e) { return s + (e.amount || 0); }, 0);
      kcalSum += p.reduce(function (s, e) { return s + (e.kcal || 0); }, 0);
      nutritionDaysCount++;
    }
    var dm = store("ina_dm_" + ds);
    if (dm) { dmSent += dm.sent || 0; dmReplies += dm.replies || 0; }
    var em = store("ina_em_" + ds);
    if (em) { emSent += em.sent || 0; emReplies += em.replies || 0; }
  });
  return {
    habitAvgPct: habitDaysCount ? Math.round((habitPctSum / habitDaysCount) * 100) : null,
    habitDaysCount: habitDaysCount,
    proteinAvg: nutritionDaysCount ? Math.round(proteinSum / nutritionDaysCount) : null,
    kcalAvg: nutritionDaysCount ? Math.round(kcalSum / nutritionDaysCount) : null,
    nutritionDaysCount: nutritionDaysCount,
    dmSent: dmSent,
    dmReplyRate: dmSent ? Math.round((dmReplies / dmSent) * 100) : 0,
    emSent: emSent,
    emReplyRate: emSent ? Math.round((emReplies / emSent) * 100) : 0
  };
}
function computeTrainingWeeks(n) {
  var weeks = [];
  for (var i = 0; i < n; i++) {
    var d = new Date();
    d.setDate(d.getDate() - 7 * i);
    var wk = weekKey(d);
    var rec = store("trainwk_" + wk) || {};
    var count = Object.keys(rec).filter(function (k) { return rec[k]; }).length;
    weeks.push({ week: wk, count: count });
  }
  return weeks;
}

  useEffect(function () { store("ina_dm_" + dateStr, dm); schedulePush(); }, [dm, dateStr]);
  useEffect(function () { store("ina_em_" + dateStr, em); schedulePush(); }, [em, dateStr]);
  useEffect(function () { store("ina_tasks_" + dateStr, dayTasks); schedulePush(); }, [dayTasks, dateStr]);
  useEffect(function () { store("ina_tasks_week_" + wk, weekTasks); schedulePush(); }, [weekTasks, wk]);

  function changeDay(delta) {
    setSelectedDate(function (d) {
      var nd = new Date(d);
      nd.setDate(nd.getDate() + delta);
      if (delta > 0 && nd.toDateString() !== todayStr() && nd > new Date()) return d;
      return nd;
    });
  }
  var dayLabel = isToday ? "Today" : selectedDate.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });

  return html`<div>
    <div style=${{ padding: "16px 16px 8px", borderBottom: "1px solid #1a1a1a" }}>

          <span style=${{ fontSize: 12, color: "#888", minWidth: 70, textAlign: "center" }}>${dayLabel}</span>
          <button style=${{ background: "#1a1a1a", border: "none", color: isToday ? "#333" : "#E0DDD6", borderRadius: 6, width: 28, height: 28, fontSize: 14, cursor: isToday ? "default" : "pointer" }}
            onClick=${function () { changeDay(1); }} disabled=${isToday}>ŌĆ║</button>
        </div>
      </div>
    </div>
    <div style=${{ padding: "12px 16px" }}>
      <${OutreachCard} title="DM Outreach" data=${dm} setData=${setDm} color="#EF4444" target=${50} />
      <${OutreachCard} title="Email Outreach" data=${em} setData=${setEm} color="#8B5CF6" target=${40} />
      <div style=${card}>
        <div style=${{ fontSize: 11, color: "#444", textAlign: "center" }}>
          ${dayLabel}'s reply rate ŌĆö DM: ${dm.sent ? Math.round((dm.replies / dm.sent) * 100) : 0}% / Email: ${em.sent ? Math.round((em.replies / em.sent) * 100) : 0}%

      <${TaskList} title=${dayLabel + "'s Tasks"} tasks=${dayTasks} setTasks=${setDayTasks} />
      <${TaskList} title="This Week's Tasks" tasks=${weekTasks} setTasks=${setWeekTasks} />
    </div>
  </div>`;
}

function FinanceTab(props) {
  var s1 = useState(""), desc = s1[0], setDesc = s1[1];
  var s2 = useState(""), amt = s2[0], setAmt = s2[1];
  var s3 = useState("expense"), type = s3[0], setType = s3[1];
  function updateGoal(key, field, value) {
    props.setGoals(function (g) {
      var n = Object.assign({}, g);
      n[key] = Object.assign({}, n[key]);
      n[key][field] = value;
      return n;
    });
  }
  var income = props.tx.filter(function (t) { return t.type === "income"; }).reduce(function (s, t) { return s + t.amt; }, 0);
  var expenses = props.tx.filter(function (t) { return t.type === "expense"; }).reduce(function (s, t) { return s + t.amt; }, 0);
  var net = income - expenses;
  var now = new Date();
  var monthTx = props.tx.filter(function (t) {
    var dt = new Date(t.date);
    return !isNaN(dt) && dt.getMonth() === now.getMonth() && dt.getFullYear() === now.getFullYear();
  });
  var monthIncome = monthTx.filter(function (t) { return t.type === "income"; }).reduce(function (s, t) { return s + t.amt; }, 0);
  var monthExpenses = monthTx.filter(function (t) { return t.type === "expense"; }).reduce(function (s, t) { return s + t.amt; }, 0);
  return html`<div>
    <div style=${{ padding: "16px 16px 8px", borderBottom: "1px solid #1a1a1a" }}>
      <div style=${lbl}>Finance</div>
      <h1 style=${{ fontSize: 20, fontWeight: 700, margin: "4px 0 0" }}>Money</h1>
    </div>
    <div style=${{ padding: "12px 16px" }}>
      <div style=${{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
        <div style=${Object.assign({}, card, { textAlign: "center", marginBottom: 0 })}>
          <div style=${{ fontSize: 18, fontWeight: 700, color: "#059669" }}>┬Ż${income}</div>
          <div style=${{ fontSize: 10, color: "#444", marginTop: 2 }}>Income (all time)</div>
        </div>
        <div style=${Object.assign({}, card, { textAlign: "center", marginBottom: 0 })}>
          <div style=${{ fontSize: 18, fontWeight: 700, color: "#EF4444" }}>┬Ż${expenses}</div>
          <div style=${{ fontSize: 10, color: "#444", marginTop: 2 }}>Expenses (all time)</div>
        </div>
      </div>
      <div style=${Object.assign({}, card, { textAlign: "center", marginBottom: 8 })}>
        <div style=${{ fontSize: 18, fontWeight: 700, color: net >= 0 ? "#059669" : "#EF4444" }}>┬Ż${net}</div>
        <div style=${{ fontSize: 10, color: "#444", marginTop: 2 }}>Net (all time)</div>
      </div>
      <div style=${Object.assign({}, card, { marginBottom: 8 })}>
        <div style=${Object.assign({}, lbl, { marginBottom: 8 })}>This month</div>
        <div style=${row}><span style=${{ fontSize: 12, color: "#888" }}>Income</span><span style=${{ fontSize: 13, fontWeight: 700, color: "#059669" }}>┬Ż${monthIncome}</span></div>
        <div style=${row}><span style=${{ fontSize: 12, color: "#888" }}>Expenses</span><span style=${{ fontSize: 13, fontWeight: 700, color: "#EF4444" }}>┬Ż${monthExpenses}</span></div>
        <div style=${row}><span style=${{ fontSize: 12, color: "#888" }}>Net</span><span style=${{ fontSize: 13, fontWeight: 700, color: (monthIncome - monthExpenses) >= 0 ? "#059669" : "#EF4444" }}>┬Ż${monthIncome - monthExpenses}</span></div>
      </div>
      <${GoalCard} title="Emergency Fund" color="#3B82F6" goal=${props.goals.emergency} onChange=${function (f, v) { updateGoal("emergency", f, v); }} />
      <${GoalCard} title="Investments" color="#8B5CF6" goal=${props.goals.investment} onChange=${function (f, v) { updateGoal("investment", f, v); }} />
      <${GoalCard} title="Savings" color="#10B981" goal=${props.goals.savings} onChange=${function (f, v) { updateGoal("savings", f, v); }} />
      <${GoalCard} title="Fun Savings" color="#EC4899" goal=${props.goals.fun} onChange=${function (f, v) { updateGoal("fun", f, v); }} />
      <div style=${card}>
        <div style=${Object.assign({}, lbl, { marginBottom: 8 })}>Add Transaction</div>
        <input style=${Object.assign({}, inp, { marginBottom: 6 })} placeholder="Description" value=${desc} onChange=${function (e) { setDesc(e.target.value); }} />
        <input style=${Object.assign({}, inp, { marginBottom: 6 })} type="number" placeholder="Amount (┬Ż)" value=${amt} onChange=${function (e) { setAmt(e.target.value); }} />
        <div style=${{ display: "flex", gap: 6, marginBottom: 8 }}>
          <button style=${Object.assign({}, pill("#059669", type === "income"), { flex: 1 })} onClick=${function () { setType("income"); }}>income</button>
          <button style=${Object.assign({}, pill("#EF4444", type === "expense"), { flex: 1 })} onClick=${function () { setType("expense"); }}>expense</button>
        </div>
        <button style=${abtn(type === "income" ? "#059669" : "#EF4444")} onClick=${function () {
          if (!amt || isNaN(amt)) return;
          props.setTx(function (t) { return t.concat([{ desc: desc || "ŌĆö", amt: parseFloat(amt), type: type, date: new Date().toISOString() }]); });

      ${props.tx.length > 0 ? html`<div style=${card}>

}

function App() {
  var today = getDay();
  var s1 = useState("today"), tab = s1[0], setTab = s1[1];
  var s2 = useState(today), schedDay = s2[0], setSchedDay = s2[1];
  var s3 = useState(loadSchedule), schedule = s3[0], setSchedule = s3[1];
  var sH = useState(loadHabits), habitsCfg = sH[0], setHabitsCfg = sH[1];
  var sWP = useState(loadWorkoutPlan), workoutPlan = sWP[0], setWorkoutPlan = sWP[1];
  var sWL = useState(function () { return store("workout_log_" + todayStr()) || { day: today, sets: {} }; }), workoutLog = sWL[0], setWorkoutLog = sWL[1];
  var s4 = useState(function () { return store("habits_" + todayStr()) || {}; }), habits = s4[0], setHabits = s4[1];
  var s5 = useState(function () { return store("plog_" + todayStr()) || []; }), pLog = s5[0], setPLog = s5[1];
  var wk = weekKey();
  var s6 = useState(function () { return store("trainwk_" + wk) || {}; }), trainWk = s6[0], setTrainWk = s6[1];
  var s9 = useState(function () { return store("finance_tx") || []; }), tx = s9[0], setTx = s9[1];
  var sG = useState(loadGoals), goals = sG[0], setGoals = sG[1];

  useEffect(function () { store("habits_cfg", habitsCfg); schedulePush(); }, [habitsCfg]);
  useEffect(function () { store("workout_plan_cfg", workoutPlan); schedulePush(); }, [workoutPlan]);
  useEffect(function () { store("workout_log_" + todayStr(), workoutLog); schedulePush(); }, [workoutLog]);
  useEffect(function () { store("habits_" + todayStr(), habits); schedulePush(); }, [habits]);
  useEffect(function () { store("plog_" + todayStr(), pLog); schedulePush(); }, [pLog]);
  useEffect(function () { store("trainwk_" + wk, trainWk); schedulePush(); }, [trainWk]);
  useEffect(function () { store("finance_tx", tx); schedulePush(); }, [tx]);
  useEffect(function () { store("finance_goals", goals); schedulePush(); }, [goals]);
  useEffect(function () {
    var override = {};
    ALL_DAYS.forEach(function (d) {
      var diff = {};
      Object.keys(schedule[d]).forEach(function (k) {
        if (schedule[d][k] !== SCHEDULE_DEFAULT[d][k]) diff[k] = schedule[d][k];
      });
      if (Object.keys(diff).length) override[d] = diff;
    });
    store("schedule_cfg", override);
    schedulePush();
  }, [schedule]);

  var isWknd = ["SAT", "SUN"].indexOf(getDay()) !== -1;
  var allH = isWknd ? habitsCfg.weekday.concat(habitsCfg.weekend) : habitsCfg.weekday;
  var hDone = allH.filter(function (h) { return habits[h.id]; }).length;
  var pTotal = pLog.reduce(function (s, e) { return s + e.amount; }, 0);
  var kcalTotal = pLog.reduce(function (s, e) { return s + (e.kcal || 0); }, 0);
  var pTarget = 130, kcalTarget = 2500;

  function toggle(id) { setHabits(function (h) { var n = Object.assign({}, h); n[id] = !n[id]; return n; }); }
  function addP(name, amount, kcal, cb) {
    if (!amount || isNaN(amount)) return;
    setPLog(function (p) {
      return p.concat([{ name: name, amount: parseInt(amount), kcal: parseInt(kcal) || 0, time: new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }) }]);
    });
    if (cb) cb();
  }

  return html`<div style=${{ minHeight: "100vh", background: "#080808", color: "#E0DDD6", paddingBottom: 80 }}>
    ${tab === "today" ? html`<${TodayTab} schedDay=${schedDay} setSchedDay=${setSchedDay} schedule=${schedule} hDone=${hDone} allHLen=${allH.length} pTotal=${pTotal} kcalTotal=${kcalTotal} pTarget=${pTarget} kcalTarget=${kcalTarget} />` : null}
    ${tab === "habits" ? html`<${HabitsTab} habits=${habits} toggle=${toggle} allH=${allH} hDone=${hDone} pLog=${pLog} addP=${addP} setPLog=${setPLog} pTotal=${pTotal} pTarget=${pTarget} kcalTotal=${kcalTotal} kcalTarget=${kcalTarget} habitsCfg=${habitsCfg} setHabitsCfg=${setHabitsCfg} />` : null}
    ${tab === "training" ? html`<${TrainTab} schedule=${schedule} onSaveSchedule=${setSchedule} trainWk=${trainWk} setTrainWk=${setTrainWk} workoutPlan=${workoutPlan} onSaveWorkoutPlan=${setWorkoutPlan} workoutLog=${workoutLog} setWorkoutLog=${setWorkoutLog} />` : null}
    ${tab === "ina" ? html`<${InaTab} />` : null}
    ${tab === "trends" ? html`<${TrendsTab} />` : null}
    ${tab === "finance" ? html`<${FinanceTab} tx=${tx} setTx=${setTx} goals=${goals} setGoals=${setGoals} />` : null}
    <${BottomNav} tab=${tab} setTab=${setTab} />
  </div>`;
}

function renderApp() {
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
}

(function boot() {
  initSync().then(function (sync) {
    window.__lifeOsSync = sync;
    if (!sync) { renderApp(); return; }
    withTimeout(sync.fsMod.getDoc(sync.ref), 2500).then(function (snap) {
      if (snap && snap.exists && snap.exists()) {
        var remote = snap.data();
        var localUpdated = parseInt(localStorage.getItem("__updatedAt__") || "0", 10);
        if (remote.updatedAt && remote.updatedAt > localUpdated) {
          applyState(JSON.parse(remote.blob));
          localStorage.setItem("__updatedAt__", String(remote.updatedAt));
        }
      }
    }).catch(function (e) { console.warn("sync pull failed", e); }).then(renderApp);
  }).catch(function () { renderApp(); });
})();
</script>
